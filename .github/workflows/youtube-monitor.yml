name: YouTube Monitor

on:
  schedule:
    - cron: '0 * * * *'    # 毎時0分（1時間ごと）
  workflow_dispatch:          # 手動実行も可能

# 前の実行が完了するまで次の実行をキューイング（重複防止）
concurrency:
  group: youtube-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # === ステップ1: YouTube探索のみ（pendingに積む） ===
      - name: Search YouTube (pendingキュー更新)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python src/main.py --once --search-only

      # === ステップ2: 探索結果をpush ===
      - name: Commit and push search results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          cp -r data/ /tmp/data_backup_search/
          
          git add data/
          git diff --staged --quiet || git commit -m "auto: update pending videos $(date -u +'%Y-%m-%d %H:%M')"
          
          for i in 1 2 3; do
            git push && break
            echo "Push failed (attempt $i/3), resolving and retrying..."
            git reset HEAD~1 2>/dev/null || true
            git checkout -- . 2>/dev/null || true
            git clean -fd 2>/dev/null || true
            git pull origin main
            cp -r /tmp/data_backup_search/* data/
            git add data/
            git diff --staged --quiet || git commit -m "auto: update pending videos $(date -u +'%Y-%m-%d %H:%M')"
            sleep 3
          done

      # === ステップ3: AI分析の実行（pending消化） ===
      - name: Process pending videos (AI分析)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/main.py --once --process-pending --defer-notify

      # === ステップ4: 分析結果をpush ===
      - name: Commit and push analysis results
        run: |
          cp -r data/ /tmp/data_backup_analysis/
          cp -r output/ /tmp/output_backup_analysis/
          
          git add data/ output/
          git diff --staged --quiet || git commit -m "auto: update monitor results $(date -u +'%Y-%m-%d %H:%M')"
          
          for i in 1 2 3; do
            git push && break
            echo "Push failed (attempt $i/3), resolving and retrying..."
            git reset HEAD~1 2>/dev/null || true
            git checkout -- . 2>/dev/null || true
            git clean -fd 2>/dev/null || true
            git pull origin main
            cp -r /tmp/data_backup_analysis/* data/
            cp -r /tmp/output_backup_analysis/* output/
            git add data/ output/
            git diff --staged --quiet || git commit -m "auto: update monitor results $(date -u +'%Y-%m-%d %H:%M')"
            sleep 3
          done

      # === ステップ5: Discord遅延通知送信 ===
      - name: Send deferred Discord notifications
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_IDEA_WEBHOOK_URL: ${{ secrets.DISCORD_IDEA_WEBHOOK_URL }}
        run: python src/main.py --send-deferred
