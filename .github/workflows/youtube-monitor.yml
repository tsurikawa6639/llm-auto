name: YouTube Monitor

on:
  schedule:
    - cron: '0 * * * *'    # 毎時0分（1時間ごと）
  workflow_dispatch:          # 手動実行も可能

# 前の実行が完了するまで次の実行をキューイング（重複防止）
concurrency:
  group: youtube-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run YouTube Monitor (通知は後で送信)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/main.py --once --defer-notify

      - name: Cleanup old reports (keep 7 days)
        run: |
          # 7日より古いレポートファイルを削除
          find output/csv -name "report_*" -type f -mtime +7 -delete 2>/dev/null || true
          find output/md -name "report_*" -type f -mtime +7 -delete 2>/dev/null || true
          # 7日より古いアイディアファイルを削除
          find output/ideas -name "*.md" -type f -mtime +7 -delete 2>/dev/null || true
          echo "Cleanup complete"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # data/ と output/ のファイルを一時的にバックアップ
          cp -r data/ /tmp/data_backup/
          cp -r output/ /tmp/output_backup/
          
          git add data/ output/
          git diff --staged --quiet || git commit -m "auto: update monitor results $(date -u +'%Y-%m-%d %H:%M')"
          
          # pushが競合した場合のリトライ（最大3回）
          for i in 1 2 3; do
            git push && break
            echo "Push failed (attempt $i/3), resolving and retrying..."
            
            # rebase中のコンフリクトを回避するため、リセットして再コミット
            git reset HEAD~1 2>/dev/null || true
            git checkout -- . 2>/dev/null || true
            git clean -fd 2>/dev/null || true
            git pull origin main
            
            # バックアップからファイルを復元して再コミット
            cp -r /tmp/data_backup/* data/
            cp -r /tmp/output_backup/* output/
            git add data/ output/
            git diff --staged --quiet || git commit -m "auto: update monitor results $(date -u +'%Y-%m-%d %H:%M')"
            sleep 3
          done

      - name: Send deferred Discord notifications
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_IDEA_WEBHOOK_URL: ${{ secrets.DISCORD_IDEA_WEBHOOK_URL }}
        run: python src/main.py --send-deferred
