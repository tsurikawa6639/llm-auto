name: YouTube Monitor

on:
  schedule:
    - cron: '0 */2 * * *'  # 2時間ごとに実行（UTC基準）
  workflow_dispatch:          # 手動実行も可能

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run YouTube Monitor
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_IDEA_WEBHOOK_URL: ${{ secrets.DISCORD_IDEA_WEBHOOK_URL }}
        run: python src/main.py --once

      - name: Cleanup old reports (keep 7 days)
        run: |
          # 7日より古いレポートファイルを削除
          find output -name "report_*" -type f -mtime +7 -delete 2>/dev/null || true
          # 7日より古いアイディアファイルを削除
          find output/ideas -name "*.md" -type f -mtime +7 -delete 2>/dev/null || true
          echo "Cleanup complete"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ output/
          git diff --staged --quiet || git commit -m "auto: update monitor results $(date -u +'%Y-%m-%d %H:%M')"
          git push
