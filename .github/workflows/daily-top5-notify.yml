name: Daily Top5 Notify

on:
  push:
    paths:
      - 'output/daily_top5/**.md'
  workflow_dispatch:
    inputs:
      file:
        description: '送信するファイルパス（空ならoutput/daily_top5/の最新ファイル）'
        required: false
        default: ''

concurrency:
  group: daily-top5-notify
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Send Discord notification
        env:
          DISCORD_IDEA_WEBHOOK_URL: ${{ secrets.DISCORD_IDEA_WEBHOOK_URL }}
        run: |
          if [ -n "${{ github.event.inputs.file }}" ]; then
            python src/daily_top5_notify.py --file "${{ github.event.inputs.file }}"
          else
            python src/daily_top5_notify.py
          fi
