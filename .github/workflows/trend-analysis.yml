name: Trend Analysis

on:
  schedule:
    - cron: '0 15 * * *'  # UTC 15:00 = JST 0:00（毎日1回）
  workflow_dispatch:          # 手動実行も可能

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-trend.txt

      - name: Run trend analysis
        run: python src/trend_analyzer.py --days 3

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/trend/
          git diff --staged --quiet || git commit -m "auto: trend analysis $(date -u +'%Y-%m-%d')"
          git push
