name: Archive Old Ideas

on:
  schedule:
    - cron: '0 15 * * *'    # 毎日 UTC 15:00 (JST 0:00)
  workflow_dispatch:          # 手動実行も可能

concurrency:
  group: ideas-archive
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Archive old idea files
        run: |
          CUTOFF_DATE=$(date -d "7 days ago" +%Y%m%d)
          ARCHIVE_DIR="output/ideas/archive"
          mkdir -p "$ARCHIVE_DIR"

          cd output/ideas

          # ファイル名プレフィックスから日付を抽出し、古いファイルを日付ごとにグループ化
          declare -A DATE_FILES
          for f in *.md; do
            [ -f "$f" ] || continue
            FILE_DATE=$(echo "$f" | grep -oP '^\d{8}')
            [ -z "$FILE_DATE" ] && continue
            if [ "$FILE_DATE" -le "$CUTOFF_DATE" ] 2>/dev/null; then
              DATE_FILES[$FILE_DATE]+=" $f"
            fi
          done

          ARCHIVED=0
          for date in "${!DATE_FILES[@]}"; do
            ARCHIVE_FILE="archive/ideas_${date}.tar.gz"
            if [ ! -f "$ARCHIVE_FILE" ]; then
              tar czf "$ARCHIVE_FILE" ${DATE_FILES[$date]}
              echo "Archived: $ARCHIVE_FILE ($(echo ${DATE_FILES[$date]} | wc -w) files)"
            else
              # 既存アーカイブに追加（一旦展開して再圧縮）
              TMPDIR=$(mktemp -d)
              tar xzf "$ARCHIVE_FILE" -C "$TMPDIR"
              cp ${DATE_FILES[$date]} "$TMPDIR/"
              tar czf "$ARCHIVE_FILE" -C "$TMPDIR" .
              rm -rf "$TMPDIR"
              echo "Updated: $ARCHIVE_FILE"
            fi
            rm -f ${DATE_FILES[$date]}
            ARCHIVED=$((ARCHIVED + $(echo ${DATE_FILES[$date]} | wc -w)))
          done

          cd ../..
          echo "Archive complete: $ARCHIVED files archived"

      - name: Commit and push archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ideas/
          git diff --staged --quiet || git commit -m "auto: archive old idea files $(date -u +'%Y-%m-%d')"
          git push
