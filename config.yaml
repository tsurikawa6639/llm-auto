youtube:
  # CLI引数 -k で指定がなければこのデフォルト値を使用
  search_keywords:
    - "株式投資"
    - "投資"
    - "ファンダメンタルズ分析"
    - "テクニカル分析"
    - "投資戦略"
  max_results_per_search: 50
  published_after_hours: 3
  # ブラックリスト: 除外するチャンネル（ハンドル名 or チャンネルID）
  channel_blacklist:
    - "@tradingnews6165"  # TRADING NEWS
    - "@NMAY-l1q"
    - "@MrPNioVideos"

schedule:
  interval_hours: 2

gemini:
  models:
    - "gemini-3.1-flash-lite"          # メインモデル
    - "gemini-3-flash-preview"          # サブモデル（フォールバック1）
    - "gemini-2.5-flash-lite"           # サブサブモデル（フォールバック2）
  temperature: 0.3
  max_requests_per_run: 100  # 1回の実行あたりのGemini APIリクエスト上限
  sleep_between_requests: 25  # リクエスト間のスリープ（秒）

discord:
  enabled: false  # 通知量を抑制するためデフォルト無効。日次サマリーは daily-top5-notify ワークフローで送信
