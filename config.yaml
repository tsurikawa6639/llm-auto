youtube:
  # CLI引数 -k で指定がなければこのデフォルト値を使用
  search_keywords:
    - "株式"
  max_results_per_search: 50
  published_after_hours: 3
  # ブラックリスト: 除外するチャンネル（ハンドル名 or チャンネルID）
  channel_blacklist:
    - "@tradingnews6165"  # TRADING NEWS

schedule:
  interval_hours: 1.5

gemini:
  model: "gemini-3.1-flash-lite-preview"
  temperature: 0.3
  max_requests_per_run: 15  # 1回の実行あたりのGemini APIリクエスト上限

discord:
  enabled: true  # false にすると Discord 通知を一時停止
