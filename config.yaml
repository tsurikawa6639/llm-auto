youtube:
  # CLI引数 -k で指定がなければこのデフォルト値を使用
  search_keywords:
    - "株式"
  max_results_per_search: 50
  published_after_hours: 2
  # ブラックリスト: 除外するチャンネル（ハンドル名 or チャンネルID）
  channel_blacklist:
    - "@tradingnews6165"  # TRADING NEWS

schedule:
  interval_hours: 1

gemini:
  models:
    - "gemini-3.1-flash-lite-preview"  # メインモデル
    - "gemini-3-flash-preview"          # サブモデル（フォールバック1）
    - "gemini-2.5-flash-lite"           # サブサブモデル（フォールバック2）
  temperature: 0.3
  max_requests_per_run: 24  # 1回の実行あたりのGemini APIリクエスト上限
  sleep_between_requests: 27  # リクエスト間のスリープ（秒）

discord:
  enabled: true  # false にすると Discord 通知を一時停止
